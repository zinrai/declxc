containers:
  - name: webserver
    lxc_create_args: -t debian -- -r bookworm -a amd64
    networks:
      - type: veth
        interface: lxcbr0
        ipv4_address: 192.168.2.10/24
        ipv4_gateway: 192.168.2.1

  - name: database
    lxc_create_args: -t debian -- -r bookworm -a amd64
    networks:
      - type: veth
        interface: lxcbr0

  - name: loadbalancer
    lxc_create_args: -t debian -- -r bookworm -a amd64
    networks:
      - type: veth
        interface: lxcbr0
